<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link rel="stylesheet" href="menu.css">
<script defer src="menu.js"></script>

<style>
:root {
  --hex-size: clamp(70px, 10vw, 140px);
  --hex-gap: clamp(8px, 1.5vw, 18px);
  --handle-height: 70px;
}

/* GLOBAL */
@font-face {
  font-family: "UD Digi Kyokasho";
  src: url("UD Digi Kyokasho NP-B.ttf");
}

* {
  font-family: "UD Digi Kyokasho", sans-serif;
  color: white;
  text-shadow:
    -3px -3px 5px #4A281C,
     3px -3px 5px #4A281C,
    -3px  3px 5px #4A281C,
     3px  3px 5px #4A281C;
}

/* BACKGROUND */
body {
  margin: 0;
  min-height: 100vh;

  background-color: #4a281c;
  background-image: url("HomeBackground.png");
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: contain;
  background-position: center;

  display: flex;
  justify-content: center;
  align-items: center;
}

body.menu-open {
  overflow: hidden;
}

/* CENTER PIECE */
.CenterPiece {
  position: relative;
  text-align: center;
}

.CenterImage img {
  width: clamp(200px, 50vw, 550px);
  height: auto;
}

.Name {
  position: absolute;
  top: 0;
  left: 0;
  transform: translate(-80%, 100%);
  font-size: clamp(18px, 3vw, 45px);
}

.JobTitle {
  position: absolute;
  bottom: 0;
  right: 0;
  transform: translate(90%, -80%);
  font-size: clamp(18px, 3vw, 45px);
}

/* MOBILE CENTER FIX */
@media (max-width: 768px) {
  .CenterPiece {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .Name, .JobTitle {
    position: static;
    transform: none;
  }

  .Name { margin-bottom: 30px; }
  .JobTitle { margin-top: 30px; }
}
</style>
</head>

<body>

<div class="CenterPiece">
  <div class="Name">Enkel Cipa</div>
  <div class="CenterImage">
    <img src="PicOfMe.png">
  </div>
  <div class="JobTitle">Gameplay and<br>Technical Designer</div>
</div>

</body>
</html>
