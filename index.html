<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
:root {
  --hex-size: clamp(70px, 10vw, 140px);
  --hex-gap: clamp(8px, 1.5vw, 18px);
}

/* =========================
   BASE LAYOUT
========================= */

body {
  background-color: #4a281c;
  background-image: url("HomeBackground.png");
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: contain;
  background-position: center;

  margin: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* =========================
   FONT
========================= */

@font-face {
  font-family: "UD Digi Kyokasho";
  src: url("UD Digi Kyokasho NP-B.ttf");
}

/* =========================
   CENTER PIECE
========================= */

.CenterPiece {
  position: relative;
  display: inline-block;
  text-align: center;
}

.CenterImage img {
  width: clamp(200px, 50vw, 550px);
  height: auto;
}

/* =========================
   MENU PANEL
========================= */

.MenuPanel {
  width: 420px;
  max-width: 90vw;
  height: 100vh;

  background: url("MenuPanelBackground.png") no-repeat center/cover;
  background-color: #4a281c;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* =========================
   HONEYCOMB GRID
========================= */

.HexGrid {
  display: flex;
  justify-content: center;
  align-items: flex-start;

  gap: var(--hex-gap);
}

/* =========================
   HEX COLUMNS
========================= */

.hex-col {
  display: flex;
  flex-direction: column;
  gap: var(--hex-gap);

  justify-content: flex-start;
}

/* =========================
   HONEYCOMB STAGGER
========================= */

.hex-col.offset {
  margin-top: calc((var(--hex-size) + var(--hex-gap)) / 2);
}

/* =========================
   HEX TILES
========================= */

.HexBrown,
.HexOrange {
  width: var(--hex-size);
  height: var(--hex-size);

  display: flex;
  justify-content: center;
  align-items: center;

  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;

  font-family: "UD Digi Kyokasho";
  color: white;
  font-size: clamp(12px, 2.5vw, 20px);
  text-decoration: none;

  text-shadow:
    -3px -3px 5px #4A281C,
     3px -3px 5px #4A281C,
    -3px  3px 5px #4A281C,
     3px  3px 5px #4A281C;

  transition: transform 0.2s ease;
}

.HexBrown { background-image: url("HexFilledBrown.png"); }
.HexOrange { background-image: url("HexFilledOrange.png"); }

.HexBrown:hover,
.HexOrange:hover {
  transform: scale(1.05);
}

/* =========================
   SLIDING MENU
========================= */

.SlidingContainer {
  position: fixed;
  top: 0;
  right: -420px;
  height: 100vh;

  display: flex;
  flex-direction: row;

  transition: right 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 1000;
}

.SlidingContainer.active {
  right: 0;
}

.HandleContainer {
  width: 70px;
  height: 100vh;

  display: flex;
  align-items: center;
  justify-content: center;

  background: #4a281c;
}

.MenuPanelButton {
  width: 50px;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.SlidingContainer.active .MenuPanelButton {
  transform: rotate(180deg);
}

/* =========================
   MOBILE
========================= */

@media (max-width: 768px) {

  /* =========================
     PAGE LAYOUT SWITCH
  ========================= */

  body {
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    height: auto;
    min-height: 100vh;
  }

  /* =========================
     CENTER PIECE BECOMES HEADER
  ========================= */

  .CenterPiece {
    position: relative;
    margin-top: 20px;
    transform: none;
  }

  .Name,
  .JobTitle {
    position: static;
    transform: none;
    text-align: center;
    font-size: clamp(16px, 5vw, 28px);
  }

  /* =========================
     MENU BECOMES FULL WIDTH PANEL
  ========================= */

  .SlidingContainer {
    width: 100%;
    right: -100%;
  }

  .SlidingContainer.active {
    right: 0;
  }

  .MenuPanel {
    width: 100%;
  }

  /* =========================
     HONEYCOMB BECOMES SIMPLE GRID
  ========================= */

  .HexGrid {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .hex-col {
    margin-top: 0;
    align-items: center;
  }

  .hex-col.offset {
    margin-top: 0;
  }

  /* =========================
     TOUCH OPTIMISATION
  ========================= */

  .HexBrown,
  .HexOrange {
    width: 120px;
    height: 120px;
    font-size: 16px;
  }

  /* =========================
     OPTIONAL: REMOVE CENTER OVERLAP EFFECTS
  ========================= */

  body {
    background-size: cover;
    background-attachment: scroll;
  }
}
</style>
</head>

<body>

<!-- =========================
     CENTER PIECE
========================= -->

<div class="CenterPiece">
  <div class="CenterImage">
    <img src="PicOfMe.png">
  </div>
</div>

<!-- =========================
     SLIDING MENU
========================= -->

<div id="SlidingContainer" class="SlidingContainer">

  <div class="HandleContainer">
    <img src="MenuPanelButton.png" class="MenuPanelButton" onclick="toggleMenu()">
  </div>

  <div class="MenuPanel">

    <!-- =========================
         HONEYCOMB MENU
    ========================= -->

    <div class="HexGrid">

      <div class="hex-col">
        <a href="index.html" class="HexBrown">Home</a>
        <a href="About.html" class="HexBrown">About</a>
        <a href="" class="HexBrown">CV</a>
      </div>

      <div class="hex-col offset">
        <a href="Projects.html" class="HexOrange">Projects</a>
        <a href="LinkedIn" class="HexOrange">LinkedIn</a>
      </div>

    </div>

  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("SlidingContainer").classList.toggle("active");
}
</script>

</body>
</html>
