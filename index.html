<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="menu.css">
    <style>
:root {
  --hex-size: clamp(70px, 10vw, 140px);
  --hex-gap: clamp(8px, 1.5vw, 18px);
  --handle-height: 70px;
}

/* FONT ONLY (menu handles global text now) */
@font-face {
  font-family: "UD Digi Kyokasho";
  src: url("UD Digi Kyokasho NP-B.ttf");
}

/* =========================
   BASE LAYOUT
========================= */

body {
  background-color: #4a281c;
  background-image: url("HomeBackground.png");
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: contain;
  background-position: center;

  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

body.menu-open {
  overflow: hidden;
}

/* =========================
   CENTER PIECE
========================= */

.CenterPiece {
  position: relative;
  display: inline-block;
  text-align: center;
}

.CenterImage img {
  width: clamp(200px, 50vw, 550px);
  height: auto;
}

.Name {
  position: absolute;
  top: 0;
  left: 0;
  transform: translate(-80%, 100%);
  font-size: clamp(18px, 3vw, 45px);
}

.JobTitle {
  position: absolute;
  bottom: 0;
  right: 0;
  transform: translate(90%, -80%);
  font-size: clamp(18px, 3vw, 45px);
}
  
@media (max-width: 768px)
{
  body
  {
    background-size: cover;
    background-attachment: scroll;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100dvh;
    padding: 20px;
    box-sizing: border-box;
    
    overflow: hidden;
  }
  
  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
  }

  .CenterPiece
  {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    gap: 16px;
    width: 100%;
    text-align: center;
  }

  .Name,
  .JobTitle
  {
    position: static;
    transform: none;
    margin: 0;
  }

  .Name
  {
    font-size: clamp(22px, 6vw, 32px);
  }

  .JobTitle
  {
    font-size: clamp(18px, 5vw, 26px);
  }

  .CenterImage
  {
    display: flex;
    justify-content: center;
    width: 100%;
  }

  .CenterImage img
  {
    width: clamp(180px, 60vw, 280px);
    height: auto;
  }
}

    </style>
  </head>
  <body>
    <!-- PAGE CONTENT -->
    <div class="CenterPiece">
      <div class="Name">Enkel Cipa</div>
      <div class="CenterImage"> <img src="PicOfMe.png" alt="PicOfMe"> </div>
      <div class="JobTitle"> Gameplay and<br>
        Technical Designer </div>
    </div>
    <!-- REUSABLE MENU MOUNT POINT -->
    <div id="menu-container"></div>
    <!-- MENU SYSTEM SCRIPT -->
    <script src="menu.js"></script>
  </body>
</html>
