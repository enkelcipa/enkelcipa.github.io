<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=windows-1252">
    <title>Home</title>
    <style type="text/css">
      body {
        background-color: #4a281c;
        background-image: url("HomeBackground.png");
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: contain;
        background-position: center center;
        margin: 0px;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      @font-face {
        font-family: "UD Digi Kyokasho";
        src: url("UD Digi Kyokasho NP-B.ttf");
      }
      
      .CenterImage {
      }

      .MenuPanelButton {
        position: absolute;
        left: 25px;
        top: 50%;
        transform: translateY(-50%) rotate(0deg);
        width: 50px;
        cursor: pointer;
        transition: transform 0.3s ease;
        z-index: 10;
      }

      .MenuPanel{
        position: fixed;
        top: 0;
        right: calc(-25% + 25px);
        width: calc(25% + 75px);
        height: 100%;
        background: url("MenuPanelBackground.png") no-repeat right/contain;
        background-color: #4a281c ;
        transition: 0.4s;
        box-shadow: 2px 2px 15px 0px #C95103
      }

      .MenuPanel.active{
        right: 0;
      }

      .MenuPanel.active .MenuPanelButton {
        transform: translateY(-50%) rotate(180deg);
      }

      .HexGrid {
        position: relative;
        height: 100%;
        width: 100%;
        z-index: 1;
      }

      .HexBrown {
        position: absolute;
        width: 200px;
        height: 200px;
        background: url("HexFilledBrown.png") no-repeat center/contain;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "UD Digi Kyokasho NP-B";
        color: white;
        font-size: 20px;
        cursor: pointer;
        text-decoration: none;
        text-shadow:
          -3px -3px 5px #4A281C,
          3px -3px 5px #4A281C,
          -3px 3px 5px #4A281C,
          3px 3px 5px #4A281C;
      }

      .HexOrange {
        position: absolute;
        width: 200px;
        height: 200px;
        background: url("HexFilledOrange.png") no-repeat center/contain;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "UD Digi Kyokasho NP-B";
        color: white;
        font-size: 20px;
        cursor: pointer;
        text-decoration: none;
        text-shadow:
          -3px -3px 5px #4A281C,
          3px -3px 5px #4A281C,
          -3px 3px 5px #4A281C,
          3px 3px 5px #4A281C;
      }

      .Left {
        left: 130px;
      }

      .Right {
        right: 15px;
      }

      .HexGrid a:nth-child(1) { top: 10%; }
      .HexGrid a:nth-child(2) { top: 25%; }
      .HexGrid a:nth-child(3) { top: 40%; }
      .HexGrid a:nth-child(4) { top: 55%; }
      .HexGrid a:nth-child(5) { top: 70%; }     
      
      .Name {
        position: absolute;
        left: 22%;
        top: 40%;
        transform: translateY(-50%);
        
        font-family: "UD Digi Kyokasho NP-B";
        color: white;
        font-size: 45px;
        text-shadow:
          -3px -3px 5px #4A281C,
          3px -3px 5px #4A281C,
          -3px 3px 5px #4A281C,
          3px 3px 5px #4A281C;
      }
      
      .JobTitle {
        position: absolute;
        right: 12%;
        top: 64%;
        transform: translateY(-50%);
        
        font-family: "UD Digi Kyokasho NP-B";
        color: white;
        font-size: 45px;
        text-shadow:
          -3px -3px 5px #4A281C,
          3px -3px 5px #4A281C,
          -3px 3px 5px #4A281C,
          3px 3px 5px #4A281C;
      }
      
</style></head>
  <body>
    <!-- Pic of Me -->
    <div class="CenterImage"> <img src="PicOfMe.png" width="550"> </div>
    <!-- Name -->
    <div class="Name">Enkel Cipa</div>
    <!-- Job Title -->
    <div class="JobTitle">Gameplay and<br>
      Technical Designer</div>
    <!-- Menu Panel -->
    <div id="MenuPanel" class="MenuPanel">
      <!-- Menu Panel Button --> <img src="MenuPanelButton.png" class="MenuPanelButton"

        onclick="toggleMenu()">
      <div class="HexGrid"> <a href="index.html" class="HexBrown Left">Home</a>
        <a href="Projects.html" class="HexOrange Right">Projects</a> <a href="About.html"

          class="HexBrown Left">About</a> <a href="https://www.linkedin.com/in/enkel-cipa/"

          target="_blank" class="HexBrown Right">LinkedIn</a> <a href="" class="HexOrange Left">CV</a>
      </div>
    </div>
    <script>
      function toggleMenu() {
        document.getElementById("MenuPanel").classList.toggle("active");
      }
    </script>
  </body>
</html>
